<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Print Sheet - 3x3 Grid</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f4f4f4;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 Columns */
      grid-template-rows: repeat(3, 1fr);    /* 3 Rows */
      gap: 20px;
      max-width: 950px;
      margin: 0 auto;
    }
    .item {
      background: white;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 250px;
    }
    .item h3 {
      margin: 0 0 15px 0;
      font-size: 18px;
      letter-spacing: 2px;
      color: #333;
      border-bottom: 2px solid #eee;
      width: 100%;
      padding-bottom: 10px;
    }
    /* Critical for keeping your pixel art sharp */
    svg {
      width: 160px;
      height: 160px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    @media print {
      body { background: white; padding: 0; }
      .no-print { display: none; }
      .item { box-shadow: none; border: 1px solid #555; }
    }
  </style>
</head>
