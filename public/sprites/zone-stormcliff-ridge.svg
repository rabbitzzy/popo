<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Stormy sky -->
  <g fill="#2a2a44">
    <rect x="0" y="0" width="16" height="6"/>
  </g>
  <!-- Storm clouds -->
  <g fill="#444466">
    <rect x="0" y="1" width="7" height="3"/>
    <rect x="9" y="2" width="7" height="3"/>
    <rect x="1" y="0" width="5" height="2"/>
    <rect x="10" y="1" width="5" height="2"/>
  </g>
  <g fill="#3a3a55">
    <rect x="0" y="3" width="7" height="1"/>
    <rect x="9" y="3" width="7" height="1"/>
  </g>
  <!-- Lightning bolt -->
  <g fill="#ffff44">
    <rect x="8" y="0" width="2" height="2"/>
    <rect x="7" y="2" width="2" height="2"/>
    <rect x="8" y="4" width="2" height="1"/>
    <rect x="9" y="3" width="2" height="2"/>
  </g>
  <g fill="#ffffff">
    <rect x="8" y="0" width="1" height="1"/>
    <rect x="7" y="2" width="1" height="1"/>
    <rect x="9" y="3" width="1" height="1"/>
  </g>
  <!-- Left cliff -->
  <g fill="#3a3030">
    <rect x="0" y="5" width="5" height="11"/>
  </g>
  <g fill="#4a3a3a">
    <rect x="0" y="5" width="3" height="11"/>
    <rect x="1" y="5" width="2" height="8"/>
  </g>
  <g fill="#5a4a4a">
    <rect x="0" y="5" width="2" height="6"/>
  </g>
  <!-- Cliff edge detail left -->
  <g fill="#665555">
    <rect x="3" y="5" width="2" height="1"/>
    <rect x="2" y="6" width="1" height="1"/>
  </g>
  <!-- Right cliff -->
  <g fill="#3a3030">
    <rect x="11" y="5" width="5" height="11"/>
  </g>
  <g fill="#4a3a3a">
    <rect x="13" y="5" width="3" height="11"/>
    <rect x="13" y="5" width="2" height="8"/>
  </g>
  <g fill="#5a4a4a">
    <rect x="14" y="5" width="2" height="6"/>
  </g>
  <!-- Cliff edge detail right -->
  <g fill="#665555">
    <rect x="11" y="5" width="2" height="1"/>
    <rect x="13" y="6" width="1" height="1"/>
  </g>
  <!-- Narrow bridge path -->
  <g fill="#554444">
    <rect x="5" y="8" width="6" height="3"/>
  </g>
  <g fill="#665555">
    <rect x="5" y="8" width="6" height="1"/>
  </g>
  <!-- Bridge stones -->
  <g fill="#443333">
    <rect x="6" y="9" width="1" height="1"/>
    <rect x="9" y="9" width="1" height="1"/>
    <rect x="7" y="10" width="2" height="1"/>
  </g>
  <!-- Drop below bridge (abyss) -->
  <g fill="#111122">
    <rect x="5" y="11" width="6" height="5"/>
  </g>
  <!-- Wind lines -->
  <g fill="#6666aa" opacity="0.5">
    <rect x="0" y="7" width="4" height="1"/>
    <rect x="12" y="8" width="4" height="1"/>
    <rect x="1" y="9" width="3" height="1"/>
    <rect x="13" y="10" width="3" height="1"/>
  </g>
</svg>
