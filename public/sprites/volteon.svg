  <!-- Head row 3 -->
  <rect x="3" y="3" width="9" height="1" fill="#AA8800"/>
  <!-- Row 4: highlight -->
  <rect x="3" y="4" width="1" height="1" fill="#AA8800"/>
  <rect x="4" y="4" width="3" height="1" fill="#FFEE66"/>
  <rect x="7" y="4" width="4" height="1" fill="#FFCC00"/>
  <rect x="11" y="4" width="1" height="1" fill="#AA8800"/>
