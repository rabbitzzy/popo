  <!-- Row 8: lightning bolt continues -->
  <rect x="2" y="8" width="1" height="1" fill="#AA8800"/>
  <rect x="3" y="8" width="2" height="1" fill="#FFCC00"/>
  <rect x="5" y="8" width="3" height="1" fill="#FF8800"/>
