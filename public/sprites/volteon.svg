  <!-- Row 7: lightning bolt on body -->
  <rect x="2" y="7" width="1" height="1" fill="#AA8800"/>
  <rect x="3" y="7" width="3" height="1" fill="#FFCC00"/>
  <rect x="6" y="7" width="1" height="1" fill="#FF8800"/>
