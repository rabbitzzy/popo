  <!-- Row 10 -->
  <rect x="4" y="10" width="1" height="1" fill="#4488CC"/>
  <rect x="5" y="10" width="5" height="1" fill="#88CCFF"/>
  <rect x="10" y="10" width="1" height="1" fill="#4488CC"/>
  <!-- Row 11 -->
  <rect x="5" y="11" width="5" height="1" fill="#4488CC"/>
  <!-- Ice shard feet -->
  <rect x="4" y="12" width="2" height="1" fill="#CCEEFF"/>
  <rect x="9" y="12" width="2" height="1" fill="#CCEEFF"/>
  <rect x="3" y="13" width="2" height="1" fill="#88CCFF"/>
  <rect x="5" y="13" width="1" height="1" fill="#4488CC"/>
  <rect x="9" y="13" width="1" height="1" fill="#4488CC"/>
