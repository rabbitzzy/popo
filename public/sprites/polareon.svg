  <rect x="7" y="6" width="4" height="1" fill="#88CCFF"/>
  <rect x="11" y="6" width="1" height="1" fill="#4488CC"/>
  <!-- Row 7: cold eyes -->
  <rect x="3" y="7" width="1" height="1" fill="#4488CC"/>
  <rect x="4" y="7" width="1" height="1" fill="#88CCFF"/>
  <rect x="5" y="7" width="1" height="1" fill="#001133"/>
  <rect x="6" y="7" width="3" height="1" fill="#88CCFF"/>
  <rect x="9" y="7" width="1" height="1" fill="#001133"/>
  <rect x="10" y="7" width="1" height="1" fill="#88CCFF"/>
  <rect x="11" y="7" width="1" height="1" fill="#4488CC"/>
  <!-- Row 8: frost pattern -->
  <rect x="3" y="8" width="1" height="1" fill="#4488CC"/>
  <rect x="4" y="8" width="1" height="1" fill="#88CCFF"/>
  <rect x="5" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="6" y="8" width="3" height="1" fill="#88CCFF"/>
  <rect x="9" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="8" width="1" height="1" fill="#88CCFF"/>
  <rect x="11" y="8" width="1" height="1" fill="#4488CC"/>
