<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Sky (dusk / twilight) -->
  <g fill="#9966bb">
    <rect x="0" y="0" width="16" height="5"/>
  </g>
  <g fill="#cc88dd">
    <rect x="0" y="0" width="16" height="2"/>
  </g>
  <!-- Stars -->
  <g fill="#ffffff">
    <rect x="2" y="1" width="1" height="1"/>
    <rect x="6" y="0" width="1" height="1"/>
    <rect x="11" y="1" width="1" height="1"/>
    <rect x="14" y="0" width="1" height="1"/>
  </g>
  <!-- Ground -->
  <g fill="#6a5030">
    <rect x="0" y="9" width="16" height="7"/>
  </g>
  <g fill="#8a6a40">
    <rect x="0" y="9" width="16" height="2"/>
  </g>
  <!-- Winding path (dirt trail) -->
  <g fill="#c8a05a">
    <rect x="6" y="5" width="4" height="2"/>
    <rect x="5" y="7" width="3" height="2"/>
    <rect x="6" y="9" width="2" height="2"/>
    <rect x="7" y="11" width="3" height="2"/>
    <rect x="8" y="13" width="3" height="3"/>
  </g>
  <g fill="#e8c070">
    <rect x="7" y="5" width="2" height="1"/>
    <rect x="6" y="7" width="1" height="1"/>
    <rect x="7" y="9" width="1" height="1"/>
    <rect x="8" y="11" width="1" height="1"/>
    <rect x="9" y="13" width="1" height="2"/>
  </g>
  <!-- Left side vegetation -->
  <g fill="#3a5520">
    <rect x="0" y="5" width="5" height="5"/>
    <rect x="1" y="4" width="3" height="1"/>
  </g>
  <g fill="#4a7028">
    <rect x="0" y="5" width="4" height="3"/>
    <rect x="1" y="4" width="2" height="1"/>
  </g>
  <!-- Right side vegetation -->
  <g fill="#3a5520">
    <rect x="10" y="5" width="6" height="5"/>
    <rect x="11" y="4" width="4" height="1"/>
  </g>
  <g fill="#4a7028">
    <rect x="10" y="5" width="5" height="3"/>
    <rect x="12" y="4" width="2" height="1"/>
  </g>
  <!-- Mysterious glowing orbs -->
  <g fill="#cc44ff">
    <rect x="1" y="7" width="2" height="2"/>
    <rect x="13" y="6" width="2" height="2"/>
  </g>
  <g fill="#ee88ff">
    <rect x="1" y="7" width="1" height="1"/>
    <rect x="13" y="6" width="1" height="1"/>
  </g>
  <!-- Glow halos -->
  <g fill="#cc44ff" opacity="0.4">
    <rect x="0" y="6" width="4" height="4"/>
    <rect x="12" y="5" width="4" height="4"/>
  </g>
  <!-- Signpost -->
  <g fill="#8b5a2b">
    <rect x="4" y="7" width="1" height="3"/>
  </g>
  <g fill="#c8a070">
    <rect x="3" y="7" width="3" height="1"/>
  </g>
</svg>
