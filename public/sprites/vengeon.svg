<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Jagged rock crown -->
  <rect x="3" y="1" width="2" height="3" fill="#443322"/>
  <rect x="6" y="0" width="2" height="4" fill="#443322"/>
  <rect x="9" y="1" width="3" height="3" fill="#443322"/>
  <!-- Top rocky outline (jagged) -->
  <rect x="3" y="4" width="9" height="1" fill="#221111"/>
  <!-- Row 5: rocky highlight -->
  <rect x="2" y="5" width="1" height="1" fill="#221111"/>
  <rect x="3" y="5" width="3" height="1" fill="#BBAA99"/>
  <rect x="6" y="5" width="5" height="1" fill="#887766"/>
  <rect x="11" y="5" width="1" height="1" fill="#221111"/>
  <rect x="12" y="5" width="1" height="1" fill="#221111"/>
  <!-- Row 6 -->
  <rect x="2" y="6" width="1" height="1" fill="#221111"/>
  <rect x="3" y="6" width="2" height="1" fill="#BBAA99"/>
  <rect x="5" y="6" width="6" height="1" fill="#887766"/>
  <rect x="11" y="6" width="2" height="1" fill="#221111"/>
  <!-- Row 7: menacing eyes -->
  <rect x="2" y="7" width="1" height="1" fill="#221111"/>
  <rect x="3" y="7" width="1" height="1" fill="#887766"/>
  <rect x="4" y="7" width="2" height="1" fill="#FF2200"/>
  <rect x="6" y="7" width="3" height="1" fill="#887766"/>
  <rect x="9" y="7" width="2" height="1" fill="#FF2200"/>
  <rect x="11" y="7" width="1" height="1" fill="#887766"/>
  <rect x="12" y="7" width="1" height="1" fill="#221111"/>
  <!-- Row 8: stone texture -->
  <rect x="2" y="8" width="1" height="1" fill="#221111"/>
  <rect x="3" y="8" width="2" height="1" fill="#887766"/>
  <rect x="5" y="8" width="1" height="1" fill="#443322"/>
  <rect x="6" y="8" width="3" height="1" fill="#887766"/>
  <rect x="9" y="8" width="1" height="1" fill="#443322"/>
  <rect x="10" y="8" width="2" height="1" fill="#887766"/>
  <rect x="12" y="8" width="1" height="1" fill="#221111"/>
  <!-- Row 9 -->
  <rect x="2" y="9" width="1" height="1" fill="#221111"/>
  <rect x="3" y="9" width="9" height="1" fill="#887766"/>
  <rect x="12" y="9" width="1" height="1" fill="#221111"/>
  <!-- Row 10: rocky sides protrude -->
  <rect x="1" y="10" width="2" height="1" fill="#443322"/>
  <rect x="3" y="10" width="8" height="1" fill="#887766"/>
  <rect x="11" y="10" width="2" height="1" fill="#221111"/>
  <rect x="13" y="10" width="1" height="1" fill="#443322"/>
  <!-- Row 11 -->
  <rect x="2" y="11" width="1" height="1" fill="#221111"/>
  <rect x="3" y="11" width="9" height="1" fill="#887766"/>
  <rect x="12" y="11" width="1" height="1" fill="#221111"/>
  <!-- Row 12: ground contact jagged bottom -->
  <rect x="3" y="12" width="2" height="1" fill="#221111"/>
  <rect x="5" y="12" width="1" height="2" fill="#443322"/>
  <rect x="6" y="12" width="3" height="1" fill="#221111"/>
  <rect x="9" y="12" width="1" height="2" fill="#443322"/>
  <rect x="10" y="12" width="2" height="1" fill="#221111"/>
  <!-- Shadow dots (dark shroud effect) -->
  <rect x="4" y="6" width="1" height="1" fill="#443322"/>
  <rect x="8" y="8" width="1" height="1" fill="#443322"/>
</svg>
