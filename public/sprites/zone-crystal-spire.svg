<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Night sky with stars -->
  <g fill="#111a2a">
    <rect x="0" y="0" width="16" height="6"/>
  </g>
  <!-- Stars -->
  <g fill="#eeeeff">
    <rect x="1" y="1" width="1" height="1"/>
    <rect x="5" y="0" width="1" height="1"/>
    <rect x="10" y="1" width="1" height="1"/>
    <rect x="14" y="0" width="1" height="1"/>
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="13" y="3" width="1" height="1"/>
  </g>
  <!-- Moon -->
  <g fill="#ddeeff">
    <rect x="7" y="0" width="2" height="2"/>
  </g>
  <!-- Snowy ground -->
  <g fill="#aabbcc">
    <rect x="0" y="12" width="16" height="4"/>
  </g>
  <g fill="#ccdde8">
    <rect x="0" y="12" width="16" height="1"/>
  </g>
  <!-- Crystal spire main body -->
  <g fill="#8888cc">
    <rect x="6" y="6" width="4" height="7"/>
    <rect x="5" y="8" width="1" height="5"/>
    <rect x="10" y="8" width="1" height="5"/>
  </g>
  <!-- Crystal facets lighter -->
  <g fill="#aaaaee">
    <rect x="6" y="6" width="2" height="7"/>
    <rect x="5" y="8" width="1" height="4"/>
  </g>
  <!-- Crystal facets bright -->
  <g fill="#ccccff">
    <rect x="6" y="6" width="1" height="5"/>
    <rect x="7" y="7" width="1" height="3"/>
  </g>
  <!-- Crystal tip -->
  <g fill="#aaaaee">
    <rect x="7" y="4" width="2" height="2"/>
    <rect x="6" y="5" width="1" height="1"/>
    <rect x="9" y="5" width="1" height="1"/>
  </g>
  <g fill="#ddeeff">
    <rect x="7" y="3" width="2" height="2"/>
    <rect x="8" y="2" width="1" height="2"/>
  </g>
  <g fill="#ffffff">
    <rect x="8" y="2" width="1" height="1"/>
  </g>
  <!-- Smaller crystal left -->
  <g fill="#7777bb">
    <rect x="2" y="9" width="3" height="4"/>
    <rect x="1" y="10" width="1" height="3"/>
  </g>
  <g fill="#9999cc">
    <rect x="2" y="9" width="1" height="4"/>
  </g>
  <g fill="#bbbbee">
    <rect x="3" y="8" width="1" height="2"/>
    <rect x="2" y="8" width="1" height="1"/>
  </g>
  <!-- Smaller crystal right -->
  <g fill="#7777bb">
    <rect x="11" y="9" width="3" height="4"/>
    <rect x="14" y="10" width="1" height="3"/>
  </g>
  <g fill="#9999cc">
    <rect x="13" y="9" width="1" height="4"/>
  </g>
  <g fill="#bbbbee">
    <rect x="12" y="8" width="1" height="2"/>
    <rect x="13" y="8" width="1" height="1"/>
  </g>
  <!-- Ice glow -->
  <g fill="#aaccff" opacity="0.3">
    <rect x="5" y="5" width="6" height="8"/>
  </g>
</svg>
