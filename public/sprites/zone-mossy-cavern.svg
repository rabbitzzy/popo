<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Cave entrance exterior (grass/hillside) -->
  <g fill="#4a7a20">
    <rect x="0" y="0" width="16" height="5"/>
  </g>
  <g fill="#5a8a28">
    <rect x="0" y="0" width="16" height="2"/>
  </g>
  <!-- Cave opening arch (rock) -->
  <g fill="#4a4040">
    <rect x="0" y="4" width="16" height="12"/>
  </g>
  <g fill="#5a5050">
    <rect x="0" y="4" width="16" height="1"/>
  </g>
  <!-- Rock walls of cave mouth -->
  <g fill="#3a3030">
    <rect x="0" y="4" width="3" height="12"/>
    <rect x="13" y="4" width="3" height="12"/>
  </g>
  <g fill="#2a2020">
    <rect x="0" y="4" width="2" height="12"/>
    <rect x="14" y="4" width="2" height="12"/>
  </g>
  <!-- Cave interior darkness -->
  <g fill="#1a1510">
    <rect x="3" y="6" width="10" height="10"/>
  </g>
  <!-- Cave opening -->
  <g fill="#252015">
    <rect x="3" y="5" width="10" height="5"/>
  </g>
  <!-- Dim cave glow (bioluminescent moss) -->
  <g fill="#334422">
    <rect x="4" y="7" width="8" height="4"/>
  </g>
  <!-- Mossy glow patches -->
  <g fill="#446633">
    <rect x="4" y="8" width="3" height="2"/>
    <rect x="9" y="7" width="3" height="2"/>
    <rect x="6" y="10" width="4" height="1"/>
  </g>
  <g fill="#558844">
    <rect x="5" y="8" width="1" height="1"/>
    <rect x="10" y="7" width="1" height="1"/>
  </g>
  <!-- Moss on exterior rock -->
  <g fill="#446622">
    <rect x="0" y="6" width="2" height="3"/>
    <rect x="14" y="7" width="2" height="3"/>
    <rect x="0" y="5" width="1" height="1"/>
  </g>
  <g fill="#558833">
    <rect x="0" y="6" width="1" height="2"/>
    <rect x="15" y="7" width="1" height="2"/>
  </g>
  <!-- Cave arch top mossy rocks -->
  <g fill="#3a3535">
    <rect x="2" y="3" width="2" height="2"/>
    <rect x="12" y="3" width="2" height="2"/>
    <rect x="4" y="2" width="3" height="2"/>
    <rect x="9" y="2" width="3" height="2"/>
    <rect x="6" y="1" width="4" height="2"/>
  </g>
  <!-- Moss on arch -->
  <g fill="#3a5520">
    <rect x="6" y="1" width="4" height="1"/>
    <rect x="4" y="2" width="2" height="1"/>
    <rect x="10" y="2" width="2" height="1"/>
  </g>
  <!-- Dripping water droplets -->
  <g fill="#6699aa">
    <rect x="5" y="9" width="1" height="1"/>
    <rect x="10" y="10" width="1" height="1"/>
    <rect x="7" y="12" width="1" height="1"/>
  </g>
  <!-- Small puddle -->
  <g fill="#2a3a44">
    <rect x="6" y="13" width="4" height="2"/>
  </g>
  <g fill="#3a4a55">
    <rect x="6" y="13" width="4" height="1"/>
  </g>
</svg>
