<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Dark forest floor -->
  <g fill="#2a4a10">
    <rect x="0" y="11" width="16" height="5"/>
  </g>
  <g fill="#3a6018">
    <rect x="0" y="11" width="16" height="1"/>
  </g>
  <!-- Undergrowth -->
  <g fill="#1a3a08">
    <rect x="1" y="10" width="2" height="1"/>
    <rect x="5" y="10" width="2" height="1"/>
    <rect x="9" y="10" width="2" height="1"/>
    <rect x="13" y="10" width="2" height="1"/>
  </g>
  <!-- Left large tree trunk -->
  <g fill="#3a1a05">
    <rect x="2" y="6" width="2" height="5"/>
  </g>
  <!-- Left canopy dark -->
  <g fill="#0d3808">
    <rect x="0" y="2" width="6" height="5"/>
    <rect x="1" y="1" width="4" height="2"/>
  </g>
  <g fill="#1a5510">
    <rect x="0" y="3" width="6" height="3"/>
    <rect x="1" y="2" width="4" height="2"/>
  </g>
  <g fill="#2a6e18">
    <rect x="1" y="2" width="4" height="2"/>
  </g>
  <!-- Right large tree trunk -->
  <g fill="#3a1a05">
    <rect x="12" y="6" width="2" height="5"/>
  </g>
  <!-- Right canopy dark -->
  <g fill="#0d3808">
    <rect x="10" y="2" width="6" height="5"/>
    <rect x="11" y="1" width="4" height="2"/>
  </g>
  <g fill="#1a5510">
    <rect x="10" y="3" width="6" height="3"/>
    <rect x="11" y="2" width="4" height="2"/>
  </g>
  <!-- Center tree trunk -->
  <g fill="#3a1a05">
    <rect x="7" y="7" width="2" height="4"/>
  </g>
  <!-- Center canopy -->
  <g fill="#0d3808">
    <rect x="5" y="3" width="6" height="5"/>
  </g>
  <g fill="#1a5510">
    <rect x="5" y="2" width="6" height="4"/>
    <rect x="6" y="1" width="4" height="2"/>
  </g>
  <g fill="#2a6e18">
    <rect x="6" y="1" width="4" height="2"/>
    <rect x="7" y="0" width="2" height="1"/>
  </g>
  <!-- Sky (barely visible, dark) -->
  <g fill="#1a2a10">
    <rect x="0" y="0" width="16" height="1"/>
  </g>
</svg>
