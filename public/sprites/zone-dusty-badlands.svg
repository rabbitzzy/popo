<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Hot hazy sky -->
  <g fill="#e8c880">
    <rect x="0" y="0" width="16" height="4"/>
  </g>
  <g fill="#d4a840">
    <rect x="0" y="3" width="16" height="1"/>
  </g>
  <!-- Cracked earth base -->
  <g fill="#8a5520">
    <rect x="0" y="4" width="16" height="12"/>
  </g>
  <g fill="#aa6628">
    <rect x="0" y="4" width="16" height="2"/>
  </g>
  <g fill="#c07830">
    <rect x="0" y="4" width="16" height="1"/>
  </g>
  <!-- Cracks -->
  <g fill="#4a2a08">
    <rect x="3" y="5" width="1" height="3"/>
    <rect x="4" y="7" width="3" height="1"/>
    <rect x="6" y="7" width="1" height="2"/>
    <rect x="10" y="6" width="1" height="4"/>
    <rect x="7" y="10" width="4" height="1"/>
    <rect x="1" y="9" width="1" height="3"/>
    <rect x="1" y="11" width="3" height="1"/>
    <rect x="13" y="8" width="1" height="3"/>
    <rect x="13" y="10" width="2" height="1"/>
  </g>
  <!-- Dry grass tufts -->
  <g fill="#aa8820">
    <rect x="1" y="7" width="1" height="2"/>
    <rect x="5" y="9" width="1" height="2"/>
    <rect x="8" y="6" width="1" height="2"/>
    <rect x="12" y="7" width="1" height="2"/>
    <rect x="14" y="11" width="1" height="2"/>
    <rect x="2" y="13" width="1" height="2"/>
  </g>
  <g fill="#cc9920">
    <rect x="1" y="7" width="1" height="1"/>
    <rect x="5" y="9" width="1" height="1"/>
    <rect x="8" y="6" width="1" height="1"/>
    <rect x="12" y="7" width="1" height="1"/>
  </g>
  <!-- Small dead shrub center -->
  <g fill="#6a3a10">
    <rect x="7" y="5" width="1" height="2"/>
    <rect x="6" y="4" width="1" height="2"/>
    <rect x="8" y="4" width="1" height="2"/>
    <rect x="5" y="3" width="2" height="1"/>
    <rect x="9" y="3" width="2" height="1"/>
  </g>
  <g fill="#8a5010">
    <rect x="6" y="3" width="1" height="1"/>
    <rect x="9" y="3" width="1" height="1"/>
  </g>
</svg>
