<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Sky -->
  <g fill="#c8e8ff">
    <rect x="0" y="0" width="16" height="6"/>
  </g>
  <!-- Background mountains (far) -->
  <g fill="#99bbd8">
    <rect x="0" y="5" width="4" height="4"/>
    <rect x="1" y="4" width="2" height="1"/>
    <rect x="11" y="4" width="4" height="5"/>
    <rect x="12" y="3" width="2" height="1"/>
  </g>
  <!-- Snow cap on far mountains -->
  <g fill="#eef6ff">
    <rect x="1" y="4" width="2" height="2"/>
    <rect x="12" y="3" width="2" height="2"/>
  </g>
  <!-- Main peak (big mountain) -->
  <g fill="#6688aa">
    <rect x="4" y="6" width="8" height="9"/>
    <rect x="5" y="4" width="6" height="2"/>
    <rect x="6" y="2" width="4" height="2"/>
    <rect x="7" y="1" width="2" height="1"/>
  </g>
  <!-- Mountain shading -->
  <g fill="#4a6688">
    <rect x="8" y="3" width="3" height="4"/>
    <rect x="9" y="7" width="3" height="4"/>
    <rect x="10" y="11" width="2" height="4"/>
  </g>
  <!-- Snow cap main peak -->
  <g fill="#f0f8ff">
    <rect x="6" y="2" width="4" height="2"/>
    <rect x="5" y="4" width="6" height="2"/>
    <rect x="7" y="1" width="2" height="1"/>
    <rect x="6" y="6" width="4" height="1"/>
  </g>
  <!-- Snow highlight -->
  <g fill="#ffffff">
    <rect x="7" y="1" width="1" height="2"/>
    <rect x="6" y="3" width="2" height="1"/>
    <rect x="6" y="5" width="1" height="1"/>
  </g>
  <!-- Ground snow -->
  <g fill="#d8eeff">
    <rect x="0" y="13" width="16" height="3"/>
  </g>
  <g fill="#eef6ff">
    <rect x="0" y="13" width="16" height="1"/>
  </g>
  <!-- Snow drifts -->
  <g fill="#ffffff">
    <rect x="0" y="12" width="4" height="1"/>
    <rect x="12" y="12" width="4" height="1"/>
    <rect x="1" y="11" width="2" height="1"/>
    <rect x="13" y="11" width="2" height="1"/>
  </g>
  <!-- Ice crystals -->
  <g fill="#aaddff">
    <rect x="2" y="9" width="1" height="2"/>
    <rect x="1" y="10" width="3" height="1"/>
    <rect x="13" y="9" width="1" height="2"/>
    <rect x="12" y="10" width="3" height="1"/>
  </g>
</svg>
