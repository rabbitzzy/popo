<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Shard base: deep silver-blue -->
  <g fill="#445577">
    <rect x="7" y="1" width="2" height="2"/>
    <rect x="6" y="3" width="4" height="2"/>
    <rect x="5" y="5" width="6" height="4"/>
    <rect x="6" y="9" width="4" height="2"/>
    <rect x="7" y="11" width="2" height="3"/>
  </g>
  <!-- Mid facets: silver -->
  <g fill="#8899bb">
    <rect x="7" y="2" width="1" height="1"/>
    <rect x="6" y="4" width="3" height="1"/>
    <rect x="5" y="5" width="4" height="2"/>
    <rect x="6" y="9" width="3" height="1"/>
    <rect x="7" y="11" width="1" height="2"/>
  </g>
  <!-- Inner glow: light silver -->
  <g fill="#ccddf0">
    <rect x="7" y="5" width="2" height="2"/>
    <rect x="6" y="6" width="4" height="1"/>
    <rect x="7" y="7" width="2" height="1"/>
  </g>
  <!-- Sparkle -->
  <g fill="#ffffff">
    <rect x="7" y="6" width="1" height="1"/>
    <rect x="9" y="5" width="1" height="1"/>
  </g>
  <!-- Crescent moon symbol inside -->
  <g fill="#aabbdd">
    <rect x="7" y="5" width="3" height="1"/>
    <rect x="6" y="6" width="1" height="2"/>
    <rect x="10" y="6" width="1" height="1"/>
    <rect x="7" y="8" width="3" height="1"/>
  </g>
  <g fill="#334466">
    <rect x="8" y="6" width="2" height="2"/>
  </g>
  <!-- Star nubs around shard -->
  <g fill="#8899cc">
    <rect x="2" y="7" width="2" height="2"/>
    <rect x="12" y="7" width="2" height="2"/>
    <rect x="3" y="3" width="2" height="2"/>
    <rect x="11" y="3" width="2" height="2"/>
    <rect x="3" y="11" width="2" height="2"/>
    <rect x="11" y="11" width="2" height="2"/>
  </g>
  <!-- Star highlights -->
  <g fill="#ddeeff">
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="11" y="3" width="1" height="1"/>
    <rect x="2" y="8" width="1" height="1"/>
    <rect x="13" y="8" width="1" height="1"/>
    <rect x="3" y="12" width="1" height="1"/>
    <rect x="11" y="12" width="1" height="1"/>
  </g>
  <!-- Outline -->
  <g fill="#111d2e">
    <rect x="6" y="1" width="1" height="1"/>
    <rect x="9" y="1" width="1" height="1"/>
    <rect x="5" y="2" width="2" height="1"/>
    <rect x="9" y="2" width="2" height="1"/>
    <rect x="4" y="4" width="2" height="1"/>
    <rect x="10" y="4" width="2" height="1"/>
    <rect x="4" y="5" width="1" height="4"/>
    <rect x="11" y="5" width="1" height="4"/>
    <rect x="4" y="9" width="2" height="1"/>
    <rect x="10" y="9" width="2" height="1"/>
    <rect x="5" y="11" width="2" height="1"/>
    <rect x="9" y="11" width="2" height="1"/>
    <rect x="6" y="13" width="1" height="1"/>
    <rect x="9" y="13" width="1" height="1"/>
    <rect x="7" y="14" width="2" height="1"/>
  </g>
</svg>
