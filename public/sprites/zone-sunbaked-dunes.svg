<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Sky -->
  <g fill="#ffe090">
    <rect x="0" y="0" width="16" height="5"/>
  </g>
  <!-- Sun -->
  <g fill="#ffdd00">
    <rect x="1" y="1" width="4" height="4"/>
  </g>
  <g fill="#ffffff">
    <rect x="2" y="1" width="2" height="1"/>
    <rect x="1" y="2" width="1" height="2"/>
  </g>
  <!-- Sun rays -->
  <g fill="#ffcc00">
    <rect x="0" y="0" width="1" height="1"/>
    <rect x="5" y="0" width="1" height="1"/>
    <rect x="0" y="5" width="1" height="1"/>
    <rect x="5" y="5" width="1" height="1"/>
    <rect x="6" y="2" width="1" height="2"/>
  </g>
  <!-- Background dune -->
  <g fill="#d4a844">
    <rect x="0" y="5" width="16" height="4"/>
  </g>
  <g fill="#c09030">
    <rect x="0" y="5" width="3" height="4"/>
    <rect x="13" y="5" width="3" height="4"/>
  </g>
  <g fill="#eebb55">
    <rect x="3" y="4" width="10" height="1"/>
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="5" y="2" width="2" height="1"/>
  </g>
  <!-- Dune shadow -->
  <g fill="#aa7a20">
    <rect x="0" y="8" width="5" height="1"/>
    <rect x="11" y="8" width="5" height="1"/>
  </g>
  <!-- Front dune -->
  <g fill="#ddaa44">
    <rect x="0" y="9" width="16" height="7"/>
  </g>
  <g fill="#eebb55">
    <rect x="0" y="9" width="16" height="2"/>
  </g>
  <g fill="#f0cc66">
    <rect x="4" y="8" width="8" height="1"/>
    <rect x="5" y="7" width="6" height="1"/>
    <rect x="6" y="6" width="4" height="1"/>
  </g>
  <!-- Shadow on front dune -->
  <g fill="#bb8822">
    <rect x="0" y="11" width="4" height="5"/>
    <rect x="12" y="11" width="4" height="5"/>
  </g>
  <!-- Small cactus -->
  <g fill="#448822">
    <rect x="11" y="10" width="2" height="4"/>
    <rect x="9" y="11" width="2" height="1"/>
    <rect x="13" y="11" width="1" height="1"/>
  </g>
  <g fill="#66aa33">
    <rect x="11" y="9" width="2" height="1"/>
    <rect x="9" y="11" width="1" height="1"/>
  </g>
</svg>
