<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Icy sky -->
  <g fill="#88bbdd">
    <rect x="0" y="0" width="16" height="3"/>
  </g>
  <!-- Left glacier wall -->
  <g fill="#3366aa">
    <rect x="0" y="0" width="4" height="16"/>
  </g>
  <g fill="#4488cc">
    <rect x="0" y="0" width="2" height="16"/>
    <rect x="2" y="2" width="1" height="10"/>
  </g>
  <g fill="#66aaee">
    <rect x="0" y="1" width="1" height="12"/>
    <rect x="1" y="3" width="1" height="6"/>
  </g>
  <!-- Ice cracks left -->
  <g fill="#224488">
    <rect x="2" y="4" width="1" height="5"/>
    <rect x="3" y="6" width="1" height="3"/>
    <rect x="1" y="9" width="2" height="1"/>
  </g>
  <!-- Right glacier wall -->
  <g fill="#3366aa">
    <rect x="12" y="0" width="4" height="16"/>
  </g>
  <g fill="#4488cc">
    <rect x="14" y="0" width="2" height="16"/>
    <rect x="13" y="2" width="1" height="10"/>
  </g>
  <g fill="#66aaee">
    <rect x="15" y="1" width="1" height="12"/>
    <rect x="14" y="3" width="1" height="6"/>
  </g>
  <!-- Ice cracks right -->
  <g fill="#224488">
    <rect x="13" y="4" width="1" height="5"/>
    <rect x="12" y="6" width="1" height="3"/>
    <rect x="13" y="9" width="2" height="1"/>
  </g>
  <!-- Rift floor (deep blue) -->
  <g fill="#112244">
    <rect x="4" y="10" width="8" height="6"/>
  </g>
  <!-- Frozen water in rift -->
  <g fill="#224466">
    <rect x="4" y="11" width="8" height="5"/>
  </g>
  <g fill="#335577">
    <rect x="4" y="11" width="8" height="2"/>
  </g>
  <!-- Ice surface sheen -->
  <g fill="#88bbdd" opacity="0.5">
    <rect x="5" y="12" width="3" height="1"/>
    <rect x="10" y="13" width="2" height="1"/>
  </g>
  <!-- Rift center open area -->
  <g fill="#aaccee">
    <rect x="4" y="3" width="8" height="7"/>
  </g>
  <g fill="#ccddff">
    <rect x="4" y="3" width="8" height="1"/>
  </g>
  <!-- Icicles hanging from walls -->
  <g fill="#aaddff">
    <rect x="4" y="3" width="1" height="3"/>
    <rect x="6" y="3" width="1" height="4"/>
    <rect x="8" y="3" width="1" height="3"/>
    <rect x="10" y="3" width="1" height="4"/>
    <rect x="11" y="3" width="1" height="2"/>
  </g>
  <g fill="#ddeeff">
    <rect x="4" y="3" width="1" height="1"/>
    <rect x="6" y="3" width="1" height="1"/>
    <rect x="8" y="3" width="1" height="1"/>
    <rect x="10" y="3" width="1" height="1"/>
  </g>
</svg>
