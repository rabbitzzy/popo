<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Gem base: deep blue -->
  <g fill="#0066cc">
    <rect x="5" y="2" width="6" height="1"/>
    <rect x="3" y="3" width="10" height="1"/>
    <rect x="2" y="4" width="12" height="5"/>
    <rect x="3" y="9" width="10" height="2"/>
    <rect x="4" y="11" width="8" height="1"/>
    <rect x="5" y="12" width="6" height="1"/>
    <rect x="6" y="13" width="4" height="1"/>
  </g>
  <!-- Mid facet: bright blue -->
  <g fill="#3399ff">
    <rect x="5" y="3" width="4" height="1"/>
    <rect x="3" y="4" width="6" height="2"/>
    <rect x="3" y="6" width="4" height="2"/>
    <rect x="4" y="9" width="5" height="1"/>
  </g>
  <!-- Inner glow: sky blue -->
  <g fill="#88ccff">
    <rect x="5" y="4" width="2" height="2"/>
    <rect x="4" y="5" width="3" height="1"/>
    <rect x="5" y="6" width="2" height="1"/>
  </g>
  <!-- Highlight sparkle: white -->
  <g fill="#ffffff">
    <rect x="5" y="4" width="1" height="1"/>
    <rect x="6" y="5" width="1" height="1"/>
  </g>
  <!-- Outline -->
  <g fill="#002244">
    <rect x="5" y="1" width="6" height="1"/>
    <rect x="4" y="2" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>
    <rect x="2" y="3" width="2" height="1"/>
    <rect x="12" y="3" width="2" height="1"/>
    <rect x="1" y="4" width="1" height="5"/>
    <rect x="14" y="4" width="1" height="5"/>
    <rect x="2" y="9" width="1" height="2"/>
    <rect x="13" y="9" width="1" height="2"/>
    <rect x="3" y="11" width="1" height="1"/>
    <rect x="12" y="11" width="1" height="1"/>
    <rect x="4" y="12" width="1" height="1"/>
    <rect x="11" y="12" width="1" height="1"/>
    <rect x="5" y="13" width="1" height="1"/>
    <rect x="10" y="13" width="1" height="1"/>
    <rect x="6" y="14" width="4" height="1"/>
  </g>
</svg>
