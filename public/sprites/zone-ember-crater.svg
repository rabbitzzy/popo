<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Crater floor / lava pool -->
  <g fill="#cc2200">
    <rect x="5" y="9" width="6" height="1"/>
    <rect x="4" y="10" width="8" height="2"/>
    <rect x="5" y="12" width="6" height="1"/>
  </g>
  <g fill="#ff4400">
    <rect x="6" y="9" width="4" height="1"/>
    <rect x="5" y="10" width="6" height="2"/>
    <rect x="6" y="12" width="4" height="1"/>
  </g>
  <!-- Lava bright highlight -->
  <g fill="#ff8800">
    <rect x="6" y="10" width="2" height="1"/>
    <rect x="9" y="11" width="2" height="1"/>
    <rect x="7" y="12" width="2" height="1"/>
  </g>
  <!-- Crater rim walls (dark rock) -->
  <g fill="#3a1500">
    <rect x="2" y="5" width="2" height="5"/>
    <rect x="12" y="5" width="2" height="5"/>
    <rect x="4" y="4" width="2" height="2"/>
    <rect x="10" y="4" width="2" height="2"/>
    <rect x="4" y="13" width="2" height="1"/>
    <rect x="10" y="13" width="2" height="1"/>
    <rect x="2" y="10" width="2" height="3"/>
    <rect x="12" y="10" width="2" height="3"/>
  </g>
  <!-- Rock highlights -->
  <g fill="#7a3800">
    <rect x="3" y="5" width="1" height="4"/>
    <rect x="12" y="5" width="1" height="4"/>
    <rect x="5" y="4" width="1" height="2"/>
    <rect x="10" y="4" width="1" height="2"/>
  </g>
  <!-- Flames -->
  <g fill="#ff6600">
    <rect x="7" y="7" width="2" height="2"/>
    <rect x="6" y="8" width="1" height="1"/>
    <rect x="9" y="8" width="1" height="1"/>
  </g>
  <g fill="#ffcc00">
    <rect x="7" y="7" width="1" height="1"/>
    <rect x="8" y="8" width="1" height="1"/>
  </g>
  <!-- Smoke puffs -->
  <g fill="#555555" opacity="0.7">
    <rect x="7" y="5" width="2" height="1"/>
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="9" y="4" width="1" height="1"/>
  </g>
  <g fill="#888888" opacity="0.5">
    <rect x="7" y="3" width="2" height="1"/>
    <rect x="6" y="2" width="1" height="1"/>
    <rect x="9" y="2" width="1" height="1"/>
  </g>
</svg>
